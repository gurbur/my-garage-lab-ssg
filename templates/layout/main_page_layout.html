<div class="layout-wrapper" style="display: flex; max-width: 1200px; margin: 0 auto; gap: 2rem;">
	{{ component:sidebar }}
	
	<main class="main-content fade-in-up" style="flex: 1; padding: 2rem 0; max-width: calc(100% - 300px);">
		<section class="hero-section">
			<div class="hero-content">
				<h1 class="hero-title">Hello, World! 👋<br><span class="gradient-text">My Garage Lab</span></h1>
				<p class="hero-subtitle">
					C언어로 밑바닥부터 만든 정적 사이트 생성기(SSG)와 커스텀 웹 서버로 구동됩니다.<br>
					끝없는 호기심과 삽질의 기록을 공유하는 나만의 개발 실험실입니다.
				</p>
				<div class="hero-tags">
					<span class="tech-tag">C</span>
					<span class="tech-tag">Java</span>
					<span class="tech-tag">Network</span>
					<span class="tech-tag">CS Knowledge</span>
				</div>
			</div>
		</section>

		<section class="recent-posts-section">
			<div class="section-header">
				<h2 class="section-title">✨ 최근 작성한 글</h2>
				<a href="{{ see_more_link }}" class="see-all-btn">모든 글 보기 &rarr;</a>
			</div>
			
			<div class="post-grid">
				{{ recent_posts_list }}
			</div>
		</section>
	</main>
</div>
