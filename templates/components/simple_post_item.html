<article class="modern-card">
	<a href="{{ post_link }}" class="modern-card-link">

			<h3 class="modern-card-title">{{ post_title }}</h3>
			<p class="modern-card-excerpt">{{ post_excerpt }}</p>

		<div class="modern-card-footer">

		</div>
	</a>
</article>
